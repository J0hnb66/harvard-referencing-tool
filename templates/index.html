<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Harvard Referencing Tool</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=9999">
</head>

<body>

<div class="fluent-card">

    <div class="title-bar">
        <span class="title-text">Harvard Referencing Tool</span>
        <img src="{{ url_for('static', filename='lrc_logo.png') }}" class="logo-right">
    </div>

    <div class="content">

        <section class="section">
            <h2>1. Select Source Type</h2>
            <div class="source-type">
                <button class="source-btn" data-type="book">Book</button>
                <button class="source-btn" data-type="journal">Journal</button>
                <button class="source-btn" data-type="website">Website</button>
            </div>
        </section>

        <section class="section">
            <h2>2. Enter Details</h2>
            <div id="form-fields"></div>
        </section>

        <section class="section">
            <h2>3. Reference Preview</h2>

            <!-- ⭐ FIX APPLIED: contenteditable added -->
            <div id="reference-output" class="reference-box">

                <em>Your formatted reference will appear here.</em>
            </div>

            <div class="button-row">
                <button id="copy-btn" class="action-btn">Copy</button>
                <button id="clear-btn" class="action-btn">Clear</button>
                <button id="add-btn" class="action-btn">Add to List</button>
            </div>
        </section>

        <section class="section">
            <h2>Reference List</h2>
            <div id="reference-list"></div>
        </section>


        <section class="section">
            <h2>History</h2>
            <div id="history-box" class="history-box"></div>
            <button id="clear-history-btn" class="action-btn">Clear History</button>
        </section>

        <section class="section">
            <h2>Download</h2>
            <button id="download-btn" class="action-btn">Download All References</button>
        </section>

    </div>
    <div class="footer-inside">
        © 2026 Learning Resource Centre. All rights reserved.
    </div>

</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
